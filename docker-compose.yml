version: '3.8'

services:
  db:
    image: mysql:latest
    container_name: cp-mysql
    restart: always
    ports:
      - "33306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "rhinoceros9.0"
      MYSQL_PASSWORD: "rhinoceros9.0"
      MYSQL_DATABASE: "cp"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
