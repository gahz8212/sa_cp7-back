spring:
  config:
    import: classpath:application-common.yml
  application:
    name: bankro
  quartz:
    job-store-type: jdbc
    overwrite-existing-jobs: false
    jdbc:
      initialize-schema: never
  datasource:
    url: jdbc:mysql://localhost:3306/cp?serverTimezone=Asia/Seoul
    username: root
    password: 1111
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always

mybatis:
