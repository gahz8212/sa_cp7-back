logging:
  level:
    "[com.paycoms.cp7.bankro]": DEBUG

bankro:
  cp7:
    socket-server-host: localhost
    socket-server-port: 17340
  shinhan:
    socket-server-host: localhost
    socket-server-port: 17340

server:
  port: 8082
